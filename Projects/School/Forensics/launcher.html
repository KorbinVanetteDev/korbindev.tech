<!--
UPDATED LAUNCHER
- Full-screen lock screen (no extra branding/laptop frame)
- Swipe up / press Enter to reveal ONLY the password prompt
- Password is shown on the unlock screen (as requested)
- After unlock, shows a Windows-like desktop with an icon to open index.html
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lock Screen — Nocturne Training</title>
  <link rel="stylesheet" href="launcher.css" />
</head>
<body>
  <!-- LOCK SCREEN (full screen) -->
  <section id="lock" class="lock" aria-label="Lock screen">
    <div class="lock__wall" aria-hidden="true"></div>

    <div class="lock__top">
      <div id="timeText" class="lock__time">12:00 AM</div>
      <div id="dateText" class="lock__date">Wednesday, March 18, 2026</div>
    </div>

    <div class="lock__swipe" aria-hidden="true">
      <div class="lock__chev">⌃</div>
      <div class="lock__chev">⌃</div>
      <div class="lock__chev">⌃</div>
    </div>

    <!-- Invisible drag target (whole screen) -->
    <div id="dragLayer" class="dragLayer" aria-hidden="true"></div>
  </section>

  <!-- UNLOCK SCREEN (full screen, ONLY password prompt + shown password) -->
  <section id="unlock" class="unlock hidden" aria-label="Unlock screen">
    <div class="unlock__wall" aria-hidden="true"></div>

    <div class="unlock__center">
      <div class="user">
        <div class="user__avatar" aria-hidden="true"></div>
        <div class="user__name">Trainee</div>
      </div>

      <!-- As requested: show the password on this screen -->
      <div class="pwShown" aria-label="Training password">
        Password: <span class="pwShown__value" id="pwShownValue">trainee</span>
      </div>

      <label class="field">
        <span class="srOnly">Password</span>
        <input id="pw" class="field__input" type="password" inputmode="text" autocomplete="off" spellcheck="false" placeholder="Password" />
      </label>

      <button id="unlockBtn" class="btn btn--primary" type="button">Sign in</button>

      <div id="loginMsg" class="msg" aria-live="polite"></div>
    </div>
  </section>

  <!-- DESKTOP (full screen) -->
  <section id="desktop" class="desktop hidden" aria-label="Desktop">
    <div class="desktop__wall" aria-hidden="true"></div>

    <div class="icons" role="navigation" aria-label="Desktop icons">
      <button id="hackIcon" class="icon" type="button" aria-label="Open HackSim">
        <div class="icon__img icon__img--hack" aria-hidden="true"></div>
        <div class="icon__label">HackSim</div>
      </button>
    </div>

    <footer class="taskbar" aria-label="Taskbar">
      <div class="taskbar__left">
        <div class="orb" aria-hidden="true"></div>
        <div class="taskbar__app">NocturneOS</div>
      </div>
      <div class="taskbar__right">
        <div id="deskClock" class="clock">12:00 AM</div>
      </div>
    </footer>
  </section>

  <script>

      (function(){
    function setVh(){
      // accurate viewport height for mobile browser UI (address bar)
      document.documentElement.style.setProperty("--vh", (window.innerHeight * 0.01) + "px");
    }
    setVh();
    window.addEventListener("resize", setVh);

    // ... keep the rest of your launcher script below ...
  })();
    
    (function(){
      const lock = document.getElementById("lock");
      const unlock = document.getElementById("unlock");
      const desktop = document.getElementById("desktop");
      const dragLayer = document.getElementById("dragLayer");

      const timeText = document.getElementById("timeText");
      const dateText = document.getElementById("dateText");
      const deskClock = document.getElementById("deskClock");

      const pw = document.getElementById("pw");
      const unlockBtn = document.getElementById("unlockBtn");
      const loginMsg = document.getElementById("loginMsg");
      const hackIcon = document.getElementById("hackIcon");

      const TRAINING_PASSWORD = "trainee";

      // US-friendly date/time using local device timezone
      function formatTimeUS(d){
        return new Intl.DateTimeFormat("en-US", {
          hour: "numeric",
          minute: "2-digit",
          hour12: true
        }).format(d);
      }
      function formatDateUS(d){
        return new Intl.DateTimeFormat("en-US", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric"
        }).format(d);
      }
      function tick(){
        const d = new Date();
        const t = formatTimeUS(d);
        timeText.textContent = t;
        deskClock.textContent = t;
        dateText.textContent = formatDateUS(d);
      }
      tick();
      setInterval(tick, 1000);

      function showUnlock(){
        lock.classList.add("hidden");
        unlock.classList.remove("hidden");
        setTimeout(()=> pw.focus(), 80);
      }
      function showDesktop(){
        unlock.classList.add("hidden");
        desktop.classList.remove("hidden");
      }

      // Swipe up anywhere
      let startY = null;

      function onStart(y){ startY = y; }
      function onMove(y){
        if (startY == null) return;
        const draggedUp = startY - y;
        if (draggedUp > 120){
          startY = null;
          showUnlock();
        }
      }
      function onEnd(){ startY = null; }

      dragLayer.addEventListener("touchstart", (e)=> onStart(e.touches[0].clientY), {passive:true});
      dragLayer.addEventListener("touchmove", (e)=> onMove(e.touches[0].clientY), {passive:true});
      dragLayer.addEventListener("touchend", onEnd);

      dragLayer.addEventListener("mousedown", (e)=> onStart(e.clientY));
      window.addEventListener("mousemove", (e)=> onMove(e.clientY));
      window.addEventListener("mouseup", onEnd);

      // Keyboard: Enter reveals unlock, Enter signs in
      window.addEventListener("keydown", (e)=>{
        if (!lock.classList.contains("hidden") && e.key === "Enter") showUnlock();
        else if (!unlock.classList.contains("hidden") && e.key === "Enter") doUnlock();
      });

      function doUnlock(){
        const v = (pw.value || "").trim().toLowerCase();
        if (v !== TRAINING_PASSWORD){
          loginMsg.textContent = "Incorrect password.";
          loginMsg.className = "msg msg--bad";
          pw.select();
          return;
        }
        loginMsg.textContent = "";
        showDesktop();
      }

      unlockBtn.addEventListener("click", doUnlock);

      hackIcon.addEventListener("click", ()=>{
        window.location.href = "index.html";
      });
    })();
  </script>
</body>
</html>
