<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CoxOS — Launcher</title>
  <style>
    :root{
      --ink:#eefdf6;
      --muted:rgba(238,253,246,0.82);
      --accent:#44ff99;
      --danger:#ff5a7a;

      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;

      /* JS sets this to real viewport height in px (mobile-safe) */
      --vh: 1vh;

      /* iOS notch safe area */
      --sat: env(safe-area-inset-top, 0px);
      --sar: env(safe-area-inset-right, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
    }

    *{ box-sizing:border-box; }

    /* CRITICAL: remove all browser default spacing and prevent any outer “frame” */
    html, body{
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
      background:#000; /* in case anything shows while loading */
    }

    body{
      font-family:var(--sans);
      color:var(--ink);
    }

    /* App always pins to full viewport, no centering, no wrappers */
    #app{
      position:fixed;
      inset:0;
      width:100vw;
      height: calc(var(--vh) * 100);
      overflow:hidden;
      background:#000;
    }

    @supports (height: 100dvh){
      #app{ height: 100dvh; }
    }

    /* Screens are absolute-full; no border-radius, no shadows (prevents “empty space”) */
    .screen{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    .hidden{ display:none !important; }

    /* Wallpaper */
    .wall{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      background:
        radial-gradient(1200px 760px at 20% 15%, rgba(68,255,153,0.16), transparent 60%),
        radial-gradient(1100px 760px at 85% 25%, rgba(32,214,255,0.14), transparent 62%),
        linear-gradient(180deg, #07110d, #050807);
      transform: scale(1.05);
      filter: saturate(1.05);
    }

    /* Lock screen content */
    .lockTop{
      position:relative;
      padding:
        calc(var(--sat) + clamp(28px, 7vh, 74px))
        calc(var(--sar) + clamp(18px, 6vw, 72px))
        0
        calc(var(--sal) + clamp(18px, 6vw, 72px));
      user-select:none;
    }

    .time{
      font-weight:600;
      font-size: clamp(56px, 9.5vw, 98px);
      letter-spacing:-0.02em;
      text-shadow: 0 18px 55px rgba(0,0,0,0.45);
    }

    .date{
      margin-top:10px;
      font-size: clamp(14px, 2.2vw, 22px);
      color:var(--muted);
      text-shadow: 0 18px 55px rgba(0,0,0,0.35);
    }

    /* Chevrons only */
    .swipe{
      position:absolute;
      left:50%;
      bottom: calc(var(--sab) + clamp(14px, 3vh, 26px));
      transform:translateX(-50%);
      display:flex;
      flex-direction:column;
      gap:2px;
      opacity:0.45;
      user-select:none;
      pointer-events:none;
    }

    .chev{
      font-size:18px;
      line-height:1;
      text-align:center;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.55));
    }

    .dragLayer{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      touch-action: pan-y;
    }

    /* Unlock screen */
    .unlockWall{
      filter: blur(10px) saturate(1.05);
      transform: scale(1.10);
    }

    .center{
      position:absolute;
      left:50%;
      top:44%;
      transform:translate(-50%,-50%);
      width:min(440px, calc(100vw - 32px - var(--sal) - var(--sar)));
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      padding:
        0
        calc(16px + var(--sar))
        0
        calc(16px + var(--sal));
    }

    .user{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      user-select:none;
    }

    .avatar{
      width:92px; height:92px;
      border-radius:50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06));
      border:1px solid rgba(255,255,255,0.18);
      box-shadow: 0 24px 90px rgba(0,0,0,0.55);
    }

    .name{
      font-size:18px;
      font-weight:600;
      text-shadow: 0 18px 55px rgba(0,0,0,0.45);
    }

    .pwShown{
      font-family:var(--mono);
      font-size:13px;
      background: rgba(0,0,0,0.25);
      border:1px solid rgba(255,255,255,0.16);
      border-radius:14px;
      padding:10px 12px;
      color: rgba(238,253,246,0.92);
      width:100%;
      text-align:center;
    }

    .pwShown b{
      color: var(--accent);
      font-weight:900;
    }

    .input{
      width:100%;
      border-radius:6px;
      padding:12px 12px;
      border:1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.22);
      color:var(--ink);
      font-size:15px;
      outline:none;
    }

    .input:focus{
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.12);
    }

    .btn{
      width:100%;
      border-radius:6px;
      padding:12px 12px;
      border:1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      color:var(--ink);
      font-weight:700;
      cursor:pointer;
    }

    .btnPrimary{
      background: rgba(255,255,255,0.16);
    }

    .msg{
      min-height:18px;
      font-family:var(--mono);
      font-size:12px;
      opacity:0.95;
      width:100%;
      text-align:center;
    }

    .bad{ color: var(--danger); }

    /* Desktop */
    .icons{
      position:relative;
      padding:
        calc(var(--sat) + 22px)
        calc(var(--sar) + 22px)
        calc(var(--sab) + 80px)
        calc(var(--sal) + 22px);
      display:flex;
      gap:18px;
      align-items:flex-start;
    }

    .icon{
      width:92px;
      background: transparent;
      border:0;
      color:rgba(238,253,246,0.92);
      cursor:pointer;
      text-align:center;
      padding:0;
    }

    .icon:focus{
      outline:2px solid rgba(255,255,255,0.22);
      outline-offset:4px;
      border-radius:10px;
    }

    .iconImg{
      width:64px;
      height:64px;
      margin:0 auto;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.16);
      background: rgba(0,0,0,0.18);
      box-shadow: 0 18px 70px rgba(0,0,0,0.35);
      background:
        radial-gradient(22px 22px at 28% 30%, rgba(68,255,153,0.55), transparent 60%),
        radial-gradient(26px 26px at 70% 62%, rgba(32,214,255,0.45), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.02));
    }

    .iconLabel{
      margin-top:8px;
      font-size:12px;
      font-weight:700;
    }

    .taskbar{
      position:absolute;
      left:0; right:0; bottom:0;
      height: calc(54px + var(--sab));
      padding:
        0
        calc(12px + var(--sar))
        var(--sab)
        calc(12px + var(--sal));
      display:flex;
      align-items:center;
      justify-content:space-between;
      background: rgba(0,0,0,0.32);
      border-top:1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(8px);
    }

    .taskLeft{
      display:flex;
      align-items:center;
      gap:10px;
      color: rgba(238,253,246,0.82);
      font-weight:700;
    }

    .orb{
      width:30px; height:30px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.16);
      background:
        radial-gradient(18px 18px at 35% 35%, rgba(68,255,153,0.55), transparent 62%),
        radial-gradient(18px 18px at 70% 65%, rgba(32,214,255,0.45), transparent 62%),
        rgba(0,0,0,0.18);
    }

    .clock{
      font-family:var(--mono);
      font-size:12px;
      color: rgba(238,253,246,0.88);
    }
  </style>
</head>
<body>
  <div id="app" aria-label="NocturneOS launcher">
    <!-- LOCK SCREEN -->
    <section id="lock" class="screen" aria-label="Lock screen">
      <div class="wall" aria-hidden="true"></div>

      <div class="lockTop">
        <div id="timeText" class="time">12:00 AM</div>
        <div id="dateText" class="date">Wednesday, March 18, 2026</div>
      </div>

      <div class="swipe" aria-hidden="true">
        <div class="chev">⌃</div>
        <div class="chev">⌃</div>
        <div class="chev">⌃</div>
      </div>

      <div id="dragLayer" class="dragLayer" aria-hidden="true"></div>
    </section>

    <!-- UNLOCK SCREEN -->
    <section id="unlock" class="screen hidden" aria-label="Unlock screen">
      <div class="wall unlockWall" aria-hidden="true"></div>

      <div class="center">
        <div class="user">
          <div class="avatar" aria-hidden="true"></div>
          <div class="name">Student</div>
        </div>

        <div class="pwShown" aria-label="Training password">
          Password: <b id="pwShownValue">student</b>
        </div>

        <input id="pw" class="input" type="password" inputmode="text" autocomplete="off" spellcheck="false" placeholder="Password" />
        <button id="unlockBtn" class="btn btnPrimary" type="button">Sign in</button>
        <div id="loginMsg" class="msg" aria-live="polite"></div>
      </div>
    </section>

    <!-- DESKTOP -->
    <section id="desktop" class="screen hidden" aria-label="Desktop">
      <div class="wall" aria-hidden="true"></div>

      <div class="icons" role="navigation" aria-label="Desktop icons">
        <button id="hackIcon" class="icon" type="button" aria-label="Open HackSim">
          <div class="iconImg" aria-hidden="true"></div>
          <div class="iconLabel">HackSim</div>
        </button>
      </div>

      <footer class="taskbar" aria-label="Taskbar">
        <div class="taskLeft">
          <div class="orb" aria-hidden="true"></div>
          <div>CoxOS</div>
        </div>
        <div id="deskClock" class="clock">12:00 AM</div>
      </footer>
    </section>
  </div>

  <script>
    (function(){
      // Force true full-screen sizing (mobile address-bar + notch safe areas)
      function setVh(){
        const h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
        document.documentElement.style.setProperty("--vh", (h * 0.01) + "px");
      }
      setVh();
      window.addEventListener("resize", setVh);
      window.addEventListener("orientationchange", setVh);
      if (window.visualViewport) window.visualViewport.addEventListener("resize", setVh);

      const lock = document.getElementById("lock");
      const unlock = document.getElementById("unlock");
      const desktop = document.getElementById("desktop");
      const dragLayer = document.getElementById("dragLayer");

      const timeText = document.getElementById("timeText");
      const dateText = document.getElementById("dateText");
      const deskClock = document.getElementById("deskClock");

      const pw = document.getElementById("pw");
      const unlockBtn = document.getElementById("unlockBtn");
      const loginMsg = document.getElementById("loginMsg");
      const hackIcon = document.getElementById("hackIcon");

      const TRAINING_PASSWORD = "student";

      // US-friendly time/date, using the player's local device timezone
      function formatTimeUS(d){
        return new Intl.DateTimeFormat("en-US", {
          hour: "numeric",
          minute: "2-digit",
          hour12: true
        }).format(d);
      }
      function formatDateUS(d){
        return new Intl.DateTimeFormat("en-US", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric"
        }).format(d);
      }
      function tick(){
        const d = new Date();
        const t = formatTimeUS(d);
        timeText.textContent = t;
        deskClock.textContent = t;
        dateText.textContent = formatDateUS(d);
      }
      tick();
      setInterval(tick, 1000);

      function showUnlock(){
        lock.classList.add("hidden");
        unlock.classList.remove("hidden");
        setTimeout(()=> pw.focus(), 80);
      }
      function showDesktop(){
        unlock.classList.add("hidden");
        desktop.classList.remove("hidden");
      }

      // Swipe up anywhere
      let startY = null;
      function onStart(y){ startY = y; }
      function onMove(y){
        if (startY == null) return;
        const draggedUp = startY - y;
        if (draggedUp > 120){
          startY = null;
          showUnlock();
        }
      }
      function onEnd(){ startY = null; }

      dragLayer.addEventListener("touchstart", (e)=> onStart(e.touches[0].clientY), {passive:true});
      dragLayer.addEventListener("touchmove", (e)=> onMove(e.touches[0].clientY), {passive:true});
      dragLayer.addEventListener("touchend", onEnd);

      dragLayer.addEventListener("mousedown", (e)=> onStart(e.clientY));
      window.addEventListener("mousemove", (e)=> onMove(e.clientY));
      window.addEventListener("mouseup", onEnd);

      // Keyboard
      window.addEventListener("keydown", (e)=>{
        if (!lock.classList.contains("hidden") && e.key === "Enter") showUnlock();
        else if (!unlock.classList.contains("hidden") && e.key === "Enter") doUnlock();
      });

      function doUnlock(){
        const v = (pw.value || "").trim().toLowerCase();
        if (v !== TRAINING_PASSWORD){
          loginMsg.textContent = "Incorrect password.";
          loginMsg.className = "msg bad";
          pw.select();
          return;
        }
        loginMsg.textContent = "";
        showDesktop();
      }

      unlockBtn.addEventListener("click", doUnlock);

      hackIcon.addEventListener("click", ()=>{
        // Launch your existing game page
        window.location.href = "index.html";
      });
    })();
  </script>
</body>
</html>
